<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ObjectifDSCG | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top left, #0f172a, #020617); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s ease; }
        .glass-card:hover { transform: translateY(-8px); border-color: #38bdf8; box-shadow: 0 15px 30px -10px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-16">
        <h1 class="text-3xl font-black tracking-tighter uppercase italic">Objectif<span class="text-sky-500">DSCG</span></h1>
        <div class="hidden md:block text-slate-500 text-xs font-bold uppercase tracking-widest">Plateforme d'Entraînement Ludique</div>
    </header>

    <main class="max-w-7xl mx-auto">
        <div class="mb-12 border-l-4 border-sky-500 pl-6">
            <h2 class="text-4xl font-extrabold italic uppercase tracking-tight">Ateliers de Gestion</h2>
            <p class="text-slate-400">Transformez la théorie en réflexes automatiques.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <div class="glass-card p-8 rounded-[2rem] relative overflow-hidden group">
                <div class="w-14 h-14 bg-purple-500/10 text-purple-400 rounded-2xl flex items-center justify-center mb-6 border border-purple-500/20">
                    <i class="fas fa-boxes-stacked text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Tri d'Immobilisations</h3>
                <p class="text-slate-400 text-sm mb-8 leading-relaxed">Maîtrisez la Classe 2 : Corporelles, Incorporelles, Financières et pièges de charges.</p>
                <div class="flex justify-between items-center pt-4 border-t border-white/5">
                    <span class="text-[10px] font-black text-purple-400 uppercase tracking-widest">UE 4</span>
                    <a href="jeu-immo.html" class="bg-sky-500 hover:bg-sky-400 text-white px-6 py-2 rounded-xl text-sm font-bold transition shadow-lg shadow-sky-500/20">Lancer l'exercice</a>
                </div>
            </div>

            <div class="glass-card p-8 rounded-[2rem] opacity-40 grayscale cursor-not-allowed">
                <div class="w-14 h-14 bg-amber-500/10 text-amber-400 rounded-2xl flex items-center justify-center mb-6">
                    <i class="fas fa-chart-line text-2xl"></i>
                </div>
                <h3 class="text-xl font-bold mb-2 italic">Analyse du BFR</h3>
                <p class="text-slate-500 text-sm italic italic italic italic">Bientôt disponible...</p>
            </div>
        </div>
    </main>
</body>
</html>
