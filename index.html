<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ObjectifDSCG | Plateforme de Révision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top left, #0f172a, #020617); min-height: 100vh; color: white; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.4s ease; }
        .glass-card:hover { transform: translateY(-8px); border-color: #38bdf8; box-shadow: 0 15px 30px -10px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="p-6 md:p-12">
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-16">
        <h1 class="text-3xl font-black tracking-tighter uppercase italic text-white">Objectif<span class="text-sky-500">DSCG</span></h1>
        <div class="hidden md:block text-slate-500 text-xs font-bold uppercase tracking-widest italic text-[10px]">Maîtrise & Performance</div>
    </header>

    <main class="max-w-6xl mx-auto text-center md:text-left">
        <div class="mb-12 border-l-4 border-sky-500 pl-6">
            <h2 class="text-4xl font-extrabold italic uppercase tracking-tight">Ateliers</h2>
            <p class="text-slate-400">Choisis un module pour automatiser tes réflexes.</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="glass-card p-10 rounded-[2.5rem] relative overflow-hidden group">
                <div class="w-14 h-14 bg-purple-500/10 text-purple-400 rounded-2xl flex items-center justify-center mb-6 border border-purple-500/20"><i class="fas fa-boxes-stacked text-2xl"></i></div>
                <h3 class="text-2xl font-black mb-3 uppercase italic">Tri d'Immo</h3>
                <p class="text-slate-400 text-sm mb-10 leading-relaxed">Classe les actifs de la Classe 2 et évite les pièges des charges courantes.</p>
                <a href="jeu-immo.html" onclick="playClick()" class="bg-sky-500 hover:bg-sky-400 text-white px-10 py-3 rounded-2xl font-black transition shadow-lg shadow-sky-500/20 uppercase italic block text-center">Lancer</a>
            </div>

            <div class="glass-card p-10 rounded-[2.5rem] relative overflow-hidden group border-emerald-500/30">
                <div class="w-14 h-14 bg-emerald-500/10 text-emerald-400 rounded-2xl flex items-center justify-center mb-6 border border-emerald-500/20"><i class="fas fa-exchange-alt text-2xl"></i></div>
                <h3 class="text-2xl font-black mb-3 uppercase italic text-emerald-400">Flux Master</h3>
                <p class="text-slate-400 text-sm mb-10 leading-relaxed">Maîtrise le sens Débit/Crédit sur les écritures les plus complexes du DSCG.</p>
                <a href="jeu-flux.html" onclick="playClick()" class="bg-emerald-600 hover:bg-emerald-500 text-white px-10 py-3 rounded-2xl font-black transition shadow-lg shadow-emerald-500/20 uppercase italic block text-center">Lancer</a>
            </div>
        </div>
    </main>

    <script>
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        function playClick() {
            if (ctx.state === 'suspended') ctx.resume();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain); gain.connect(ctx.destination);
            osc.frequency.setValueAtTime(800, ctx.currentTime);
            gain.gain.setValueAtTime(0.05, ctx.currentTime);
            gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.05);
            osc.start(); osc.stop(ctx.currentTime + 0.05);
        }
    </script>
</body>
</html>
