<!DOCTYPE html>
<html lang="fr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V2428KVLEB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V2428KVLEB');
    </script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Provisions Master | ObjectifDCG/DSCG</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-neon-purple { border: 2px solid #a78bfa; box-shadow: 0 0 15px rgba(167, 139, 250, 0.3); transition: 0.2s; }
        .feedback-overlay { position: absolute; inset: 0; z-index: 100; border-radius: 3.5rem; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); text-align: center; flex-direction: column; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center font-bold italic">
    <div class="w-full max-w-lg">
        <header class="flex justify-between items-center mb-8 px-2 h-16 w-full text-left">
            <button id="btn-main-back" onclick="location.href='index.html'" class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-400 border-2 border-purple-500/30"><i class="fas fa-arrow-left"></i></button>
            <button id="btn-mode-back" onclick="showSection('screen-menu')" class="hidden w-12 h-12 glass rounded-2xl flex items-center justify-center text-purple-400 border-2 border-purple-500/50"><i class="fas fa-chevron-left text-xl"></i></button>
            <div id="game-info" class="hidden flex-1 ml-4 flex justify-between items-center glass px-6 py-2 rounded-2xl border-2 border-purple-500/50">
                <div class="text-left"><p class="text-[8px] uppercase font-black text-purple-400 italic">Score</p><p id="score-ui" class="text-lg font-extrabold text-white">0</p></div>
                <div id="timer-container" class="text-right font-mono"><p class="text-[8px] uppercase font-black text-slate-500 italic">Timer</p><p id="timer-ui" class="text-lg font-extrabold italic text-white">60s</p></div>
            </div>
        </header>

        <div id="screen-menu" class="glass rounded-[3.5rem] p-10 text-center border-2 border-purple-500/20 shadow-2xl">
            <p class="text-[10px] text-purple-400 font-bold uppercase mb-2 italic">UE 10 | Compta. Appro</p>
            <h1 class="text-4xl font-black uppercase mb-8 text-purple-400 tracking-tighter">Provisions</h1>
            <div class="grid grid-cols-1 gap-3 text-left">
                <button onclick="showSection('screen-cours')" class="glass p-5 rounded-2xl flex items-center gap-4 border-2 border-amber-500/30 text-amber-400">
                    <div class="w-10 h-10 bg-amber-500/10 rounded-xl flex items-center justify-center"><i class="fas fa-book"></i></div>
                    <div><p class="text-xs uppercase text-amber-400">Voir le Cours</p><p class="text-[9px] text-slate-500 italic">Actif vs Passif</p></div>
                </button>
                <button onclick="startGame('learning')" class="glass p-5 rounded-2xl flex items-center gap-4 border-2 border-emerald-500/30 text-emerald-400">
                    <div class="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center"><i class="fas fa-brain"></i></div>
                    <div><p class="text-xs uppercase">Apprendre</p><p class="text-[9px] text-slate-500 italic">ZEN + Pourquoi ?</p></div>
                </button>
                <button onclick="startGame('competition')" class="btn-neon-purple p-5 rounded-2xl flex items-center gap-4 text-left">
                    <div class="w-10 h-10 bg-purple-500/10 text-purple-400 rounded-xl flex items-center justify-center"><i class="fas fa-bolt"></i></div>
                    <div><p class="text-xs uppercase text-purple-400">Défier</p><p class="text-[9px] text-slate-500 italic">Points & Chrono</p></div>
                </button>
                <button onclick="startGame('survival')" class="glass p-5 rounded-2xl flex items-center gap-4 border-2 border-rose-500/30 text-rose-400 text-rose-400">
                    <div class="w-10 h-10 bg-rose-500/10 rounded-xl flex items-center justify-center"><i class="fas fa-skull"></i></div>
                    <div><p class="text-xs uppercase">Survie</p><p class="text-[9px] text-slate-500 italic">0 Faute</p></div>
                </button>
            </div>
        </div>

        <div id="screen-cours" class="hidden glass rounded-[3.5rem] p-8 max-h-[70vh] overflow-y-auto border-2 border-amber-500/50 italic text-sm text-left">
            <h2 class="text-xl font-bold mb-6 text-amber-500 uppercase text-center italic">⚖️ Actif vs Passif</h2>
            <div class="space-y-4">
                <div class="p-4 bg-white/5 rounded-xl border-l-4 border-sky-400">
                    <h3 class="text-sky-400 mb-1 uppercase text-xs">Dépréciation (Actif)</h3>
                    <p class="text-[10px] text-slate-300 italic">Perte de valeur réversible d'un actif (Terrain, Client, Stock).</p>
                </div>
                <div class="p-4 bg-white/5 rounded-xl border-l-4 border-purple-400">
                    <h3 class="text-purple-400 mb-1 uppercase text-xs">Provision R&C (Passif)</h3>
                    <p class="text-[10px] text-slate-300 italic">Dette probable au passif du bilan (Litige, Garantie, Amendes).</p>
                </div>
            </div>
            <button onclick="showSection('screen-menu')" class="w-full mt-8 bg-amber-500 text-black py-4 rounded-xl font-bold uppercase italic">J'ai compris</button>
        </div>

        <div id="screen-game" class="hidden relative text-center">
            <div class="glass rounded-[3.5rem] p-10 min-h-[300px] flex flex-col justify-center items-center relative border border-white/5 shadow-inner">
                <div id="feedback" class="hidden feedback-overlay italic font-bold"></div>
                <p class="text-[9px] uppercase font-black text-purple-400 absolute top-8 tracking-widest italic">Élément comptable</p>
                <h2 id="item-name" class="text-2xl font-black uppercase mb-4 tracking-tighter italic">---</h2>
            </div>
            <div id="options-grid" class="grid grid-cols-1 gap-3 mt-6">
                <button onclick="check('DEP')" class="glass p-5 rounded-2xl uppercase border border-white/10 hover:bg-sky-500/20 text-xs italic font-bold">Dépréciation (Actif)</button>
                <button onclick="check('PRC')" class="glass p-5 rounded-2xl uppercase border border-white/10 hover:bg-purple-500/20 text-xs italic font-bold">Provision R&C (Passif)</button>
            </div>
        </div>

        <div id="screen-end" class="hidden glass rounded-[3.5rem] p-12 text-center border-2 border-purple-500/30">
            <div id="end-visual" class="text-7xl font-black text-purple-400 mb-2 tracking-tighter italic">0</div>
            <button onclick="shareScore()" class="w-full bg-purple-600 py-5 rounded-2xl font-black uppercase text-white mb-4 flex items-center justify-center gap-3 shadow-xl"><i class="fas fa-share-nodes"></i> Partager</button>
            <button onclick="showSection('screen-menu')" class="w-full bg-white/10 py-5 rounded-2xl font-black uppercase text-white tracking-widest italic">Menu</button>
        </div>
    </div>

    <script>
        let mode, score=0, timer, timeLeft=60, isProc=false;
const db = [
    {q:"Baisse valeur Terrain (non bâtis)", r:"DEP", w:"Dépréciation (Actif)", detail:"PCG 291. Actif physique tangible qui ne s'amortit pas."},
    {q:"Client douteux (procédure collective)", r:"DEP", w:"Dépréciation (Actif)", detail:"Risque de non-recouvrement d'une créance. Compte 491."},
    {q:"Litige Prud'hommes (licenciement)", r:"PRC", w:"Provision R&C (Passif)", detail:"Dette probable envers un salarié. Compte 1511."},
    {q:"Stock de produits finis obsolètes", r:"DEP", w:"Dépréciation (Actif)", detail:"Valeur actuelle inférieure au coût de production. Compte 39."},
    {q:"Garantie décennale donnée aux clients", r:"PRC", w:"Provision R&C (Passif)", detail:"Charge probable liée aux réparations futures. Compte 1511."},
    {q:"Titres de placement (VMP) en moins-value", r:"DEP", w:"Dépréciation (Actif)", detail:"Cours de bourse < Valeur d'achat. Compte 590."},
    {q:"Gros entretien programmé (Révision)", r:"PRC", w:"Provision R&C (Passif)", detail:"Si l'entreprise n'utilise pas la méthode par composants. Compte 1572."},
    {q:"Contrôle fiscal notifié (amende)", r:"PRC", w:"Provision R&C (Passif)", detail:"Risque de sortie de ressources hautement probable."},
    {q:"Baisse de valeur d'une marque acquise", r:"DEP", w:"Dépréciation (Actif)", detail:"Actif incorporel. Compte 290."},
    {q:"Indemnités de départ à la retraite", r:"PRC", w:"Provision R&C (Passif)", detail:"Engagement social de l'entreprise. Compte 153."},
    {q:"Litige avec un fournisseur (dommages)", r:"PRC", w:"Provision R&C (Passif)", detail:"Somme probable à verser suite à un contentieux."},
    {q:"Fonds commercial (test de dépréciation)", r:"DEP", w:"Dépréciation (Actif)", detail:"Si la valeur actuelle est < VNC."},
    {q:"Matières premières périmées", r:"DEP", w:"Dépréciation (Actif)", detail:"Réduction de la valeur de l'actif circulant."},
    {q:"Restructuration (plan annoncé)", r:"PRC", w:"Provision R&C (Passif)", detail:"Charges de licenciement et fermeture. Compte 158."},
    {q:"Garantie de passif (cession)", r:"PRC", w:"Provision R&C (Passif)", detail:"Engagement lié à la vente d'une filiale."},
    {q:"Titres de participation en baisse", r:"DEP", w:"Dépréciation (Actif)", detail:"Valeur d'utilité < Valeur d'entrée. Compte 296."},
    {q:"Travaux de désamiantage obligatoires", r:"PRC", w:"Provision R&C (Passif)", detail:"Obligation légale de remise en état."},
    {q:"Droit au bail (baisse de fréquentation)", r:"DEP", w:"Dépréciation (Actif)", detail:"L'actif incorporel a perdu de sa valeur."},
    {q:"Prêts au personnel (risque de non-paiement)", r:"DEP", w:"Dépréciation (Actif)", detail:"Dépréciation de créance immobilisée. Compte 297."},
    {q:"Amende pour pollution constatée", r:"PRC", w:"Provision R&C (Passif)", detail:"Risque environnemental mesurable."},
    {q:"Avances versées sur commande annulée", r:"DEP", w:"Dépréciation (Actif)", detail:"Risque de non-récupération de l'avance."},
    {q:"Renouvellement d'immobilisations (concession)", r:"PRC", w:"Provision R&C (Passif)", detail:"Obligation contractuelle de maintien de l'outil."},
    {q:"Logiciel obsolète suite à nouvelle loi", r:"DEP", w:"Dépréciation (Actif)", detail:"Perte de valeur exceptionnelle d'un incorporel."},
    {q:"Différend avec l'URSSAF", r:"PRC", w:"Provision R&C (Passif)", detail:"Risque de redressement social."},
    {q:"Caution donnée à un tiers (appelée)", r:"PRC", w:"Provision R&C (Passif)", detail:"Sortie de ressources probable suite à un engagement de hors-bilan."},
    {q:"Ventes à perte programmées", r:"DEP", w:"Dépréciation (Actif)", detail:"Dépréciation du stock pour s'aligner sur le prix de sortie."},
    {q:"Perte de change latente", r:"PRC", w:"Provision R&C (Passif)", detail:"Risque de perte sur une dette en devise. Compte 1515."},
    {q:"Incendie partiel non assuré", r:"DEP", w:"Dépréciation (Actif)", detail:"Baisse de valeur de l'immobilisation endommagée."},
    {q:"Malfaçon sur chantier en cours", r:"PRC", w:"Provision R&C (Passif)", detail:"Coûts de remise aux normes futurs."},
    {q:"Droit à l'image contesté", r:"PRC", w:"Provision R&C (Passif)", detail:"Risque juridique sur actif immatériel."}
];
        function showSection(id) {
            ['screen-menu', 'screen-game', 'screen-end', 'screen-cours'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const isMenu = id === 'screen-menu';
            document.getElementById('btn-main-back').classList.toggle('hidden', !isMenu);
            document.getElementById('btn-mode-back').classList.toggle('hidden', isMenu);
            if(isMenu && timer) clearInterval(timer);
        }

        function startGame(m) {
            mode = m; score = 0; timeLeft = 60; showSection('screen-game');
            document.getElementById('score-ui').innerText = "0";
            if(mode === 'learning') { document.getElementById('game-info').classList.add('hidden'); }
            else {
                document.getElementById('game-info').classList.remove('hidden');
                if(mode === 'competition') {
                    document.getElementById('timer-container').classList.remove('hidden');
                    document.getElementById('timer-ui').innerText = "60s";
                    startTimer();
                } else { document.getElementById('timer-container').classList.add('hidden'); }
            }
            next();
        }

        function startTimer() {
            timer = setInterval(() => { timeLeft--; document.getElementById('timer-ui').innerText = timeLeft+"s"; if(timeLeft <= 0) stopGame(); }, 1000);
        }

        function next() {
            isProc = false; document.getElementById('feedback').classList.add('hidden');
            const item = db[Math.floor(Math.random()*db.length)];
            window.curr = item;
            document.getElementById('item-name').innerText = item.q;
        }

function check(v) {
    if(isProc) return; isProc = true;
    const isOk = (v === window.curr.r);
    const f = document.getElementById('feedback'); f.classList.remove('hidden');
    
    // Ajout des vibrations haptiques
    if ("vibrate" in navigator) isOk ? navigator.vibrate(30) : navigator.vibrate([50, 30, 50]);
            
            if(isOk) {
                if(mode !== 'learning') { score += 150; document.getElementById('score-ui').innerText = score; }
                f.className="feedback-overlay bg-emerald-500/90 text-white text-6xl"; f.innerHTML="<i class='fas fa-check'></i>";
                setTimeout(next, 300);
            } else {
                if(timer) clearInterval(timer); // PAUSE DU TIMER
                f.className="feedback-overlay bg-red-600/95 flex-col text-white p-6";
                f.innerHTML=`<i class='fas fa-times text-6xl mb-2'></i><p class='text-xs uppercase font-bold italic'>${window.curr.w}</p>
                <button onclick="alert('${window.curr.detail.replace(/'/g, "\\'")}')" class="mt-4 px-4 py-2 bg-white/20 rounded-xl text-[10px] uppercase tracking-widest italic font-bold">Pourquoi ?</button>`;
                
                if(mode === 'survival') { setTimeout(stopGame, 3500); return; }
                if(mode === 'competition') { score = Math.max(0, score-75); timeLeft -= 3; document.getElementById('score-ui').innerText = score; }
                
                setTimeout(() => {
                    next();
                    if(mode === 'competition') startTimer(); // RELANCE DU TIMER
                }, 4500);
            }
        }

function stopGame() { 
            if(timer) clearInterval(timer); 
            showSection('screen-end'); 
            document.getElementById('end-visual').innerText = mode === 'learning' ? "ZEN" : score;
            if(mode !== 'learning') {
                const key = 'prov';
                const best = parseInt(localStorage.getItem('record_' + key) || 0);
                if(score > best) localStorage.setItem('record_' + key, score);

                // LOGIQUE TOP 3
                let history = JSON.parse(localStorage.getItem('history_' + key) || "[]");
                history.push(score);
                history.sort((a, b) => b - a);
                localStorage.setItem('history_' + key, JSON.stringify(history.slice(0, 3)));

                gtag('event', 'game_finish', { 'game_name': 'Provisions Master', 'score': score, 'mode': mode });
            }
        }

        function shareScore() {
            const message = `🏆 Nouveau Record sur Provisions Master : ${score} points ! 🔥\\n\\nJoue ici : https://bibiquette.github.io/objectif-dscg/`;
            if (navigator.share) { navigator.share({ title: 'Mon Record DCG', text: message, url: 'https://bibiquette.github.io/objectif-dscg/' }).catch(() => {}); }
            else { navigator.clipboard.writeText(message).then(() => { alert("Copié !"); }); }
        }
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker PWA enregistré !');
            })
            .catch(error => {
              console.log('Erreur ServiceWorker : ', error);
            });
        });
      }
    </script>
</body>
</html>
