<!DOCTYPE html>
<html lang="fr">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-V2428KVLEB"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-V2428KVLEB');
    </script>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tri d'Immo | ObjectifDCG/DSCG</title>

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#020617">
    <link rel="apple-touch-icon" href="icon-192.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; min-height: 100vh; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-neon-sky { border: 2px solid #0ea5e9; box-shadow: 0 0 15px rgba(14, 165, 233, 0.3); transition: 0.2s; }
        .btn-neon-sky:active { background: #0ea5e9; transform: scale(0.95); }
        .feedback-overlay { position: absolute; inset: 0; z-index: 100; border-radius: 3.5rem; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px); text-align: center; flex-direction: column; }
    </style>
</head>
<body class="p-4 flex flex-col items-center justify-center italic font-bold">
    <div class="w-full max-w-lg">
        <header class="flex justify-between items-center mb-8 px-2 h-16 w-full text-left">
            <button id="btn-main-back" onclick="location.href='index.html'" class="w-12 h-12 glass rounded-2xl flex items-center justify-center text-slate-400 border-2 border-sky-500/30"><i class="fas fa-arrow-left"></i></button>
            <button id="btn-mode-back" onclick="showSection('screen-menu')" class="hidden w-12 h-12 glass rounded-2xl flex items-center justify-center text-sky-400 border-2 border-sky-500/50"><i class="fas fa-chevron-left text-xl"></i></button>
            <div id="game-info" class="hidden flex-1 ml-4 flex justify-between items-center glass px-6 py-2 rounded-2xl border-2 border-sky-500/50">
                <div class="text-left"><p class="text-[8px] uppercase font-black text-sky-400">Score</p><p id="score-ui" class="text-lg font-extrabold text-white">0</p></div>
                <div id="timer-container" class="text-right font-mono"><p class="text-[8px] uppercase font-black text-slate-500">Timer</p><p id="timer-ui" class="text-lg font-extrabold italic text-white">60s</p></div>
            </div>
        </header>

        <div id="screen-menu" class="glass rounded-[3.5rem] p-10 text-center border-2 border-sky-500/20 shadow-2xl">
            <p class="text-[10px] text-sky-400 font-bold uppercase mb-2">UE 9 | Comptabilité</p>
            <h1 class="text-4xl font-black uppercase mb-8 text-sky-400 tracking-tighter">Tri d'Immo</h1>
            <div class="grid grid-cols-1 gap-3 text-left">
                <button onclick="showSection('screen-cours')" class="glass p-5 rounded-2xl flex items-center gap-4 border-2 border-amber-500/30 text-amber-400">
                    <div class="w-10 h-10 bg-amber-500/10 rounded-xl flex items-center justify-center"><i class="fas fa-book"></i></div>
                    <div><p class="text-xs uppercase">Voir le Cours</p><p class="text-[9px] text-slate-500 italic">Révisions PCG Classe 2</p></div>
                </button>
                <button onclick="startGame('learning')" class="glass p-5 rounded-2xl flex items-center gap-4 border-2 border-emerald-500/30 text-emerald-400">
                    <div class="w-10 h-10 bg-emerald-500/10 rounded-xl flex items-center justify-center"><i class="fas fa-brain"></i></div>
                    <div><p class="text-xs uppercase">Apprendre</p><p class="text-[9px] text-slate-500 italic">ZEN + Pourquoi ?</p></div>
                </button>
                <button onclick="startGame('competition')" class="btn-neon-sky p-5 rounded-2xl flex items-center gap-4">
                    <div class="w-10 h-10 bg-sky-500/10 text-sky-400 rounded-xl flex items-center justify-center"><i class="fas fa-bolt"></i></div>
                    <div><p class="text-xs uppercase">Défier</p><p class="text-[9px] text-slate-500 italic">Score & Chrono</p></div>
                </button>
                <button onclick="startGame('survival')" class="glass p-5 rounded-2xl flex items-center gap-4 border-2 border-rose-500/30 text-rose-400">
                    <div class="w-10 h-10 bg-rose-500/10 rounded-xl flex items-center justify-center"><i class="fas fa-skull"></i></div>
                    <div><p class="text-xs uppercase text-rose-400">Survie</p><p class="text-[9px] text-slate-500 italic">0 Faute</p></div>
                </button>
            </div>
        </div>

        <div id="screen-cours" class="hidden glass rounded-[3.5rem] p-8 max-h-[70vh] overflow-y-auto border-2 border-amber-500/50 italic text-sm text-left">
            <h2 class="text-xl font-bold mb-6 text-amber-500 uppercase text-center">📚 PCG : Classe 2</h2>
            <div class="space-y-4">
                <div class="p-4 bg-white/5 rounded-xl border-l-4 border-sky-400">
                    <h3 class="text-sky-400 mb-1 uppercase text-xs">20. Incorporelles</h3>
                    <p class="text-[10px] text-slate-300">Actifs sans substance physique (Logiciels, Fonds comm.).</p>
                </div>
                <div class="p-4 bg-white/5 rounded-xl border-l-4 border-emerald-400">
                    <h3 class="text-emerald-400 mb-1 uppercase text-xs">21. Corporelles</h3>
                    <p class="text-[10px] text-slate-300">Actifs physiques tangibles (Terrains, Matériel).</p>
                </div>
            </div>
            <button onclick="showSection('screen-menu')" class="w-full mt-8 bg-amber-500 text-black py-4 rounded-xl font-bold uppercase italic">J'ai compris</button>
        </div>

        <div id="screen-game" class="hidden relative text-center">
            <div class="glass rounded-[3.5rem] p-10 min-h-[300px] flex flex-col justify-center items-center relative border border-white/5 shadow-inner">
                <div id="feedback" class="hidden feedback-overlay italic font-bold"></div>
                <p class="text-[9px] uppercase font-black text-sky-400 absolute top-8 tracking-widest italic">Élément à classer</p>
                <h2 id="item-name" class="text-2xl font-black uppercase mb-4 tracking-tighter italic">---</h2>
            </div>
            <div id="options-grid" class="grid grid-cols-1 gap-3 mt-6">
                <button onclick="check('INC')" class="glass p-5 rounded-2xl uppercase border border-white/10 hover:bg-sky-500/20 italic text-xs font-bold">Incorporelles (20)</button>
                <button onclick="check('CORP')" class="glass p-5 rounded-2xl uppercase border border-white/10 hover:bg-emerald-500/20 italic text-xs font-bold">Corporelles (21)</button>
                <button onclick="check('FIN')" class="glass p-5 rounded-2xl uppercase border border-white/10 hover:bg-amber-500/20 italic text-xs font-bold">Financières (27)</button>
            </div>
        </div>

        <div id="screen-end" class="hidden glass rounded-[3.5rem] p-12 text-center border-2 border-sky-500/30">
            <div id="end-visual" class="text-7xl font-black text-sky-400 mb-4 tracking-tighter italic">0</div>
            <button onclick="shareScore()" class="w-full bg-sky-600 py-5 rounded-2xl font-black uppercase text-white mb-4 flex items-center justify-center gap-3 shadow-xl"><i class="fas fa-share-nodes"></i> Partager</button>
            <button onclick="showSection('screen-menu')" class="w-full bg-white/10 py-5 rounded-2xl font-black uppercase italic text-white tracking-widest">Menu</button>
        </div>
    </div>

    <script>
        let mode, score=0, timer, timeLeft=60, isProc=false;
const db = [
    {q:"Fonds de commerce", r:"INC", w:"Incorporel (20)"},
    {q:"Logiciel de paie", r:"INC", w:"Incorporel (20)"},
    {q:"Terrain de construction", r:"CORP", w:"Corporel (21)"},
    {q:"Machine-outil CNC", r:"CORP", w:"Corporel (21)"},
    {q:"Titres de participation", r:"FIN", w:"Financier (26)"},
    {q:"Dépôt de garantie loyer", r:"FIN", w:"Financier (27)"},
    {q:"Brevet de fabrication", r:"INC", w:"Incorporel (20)"},
    {q:"Aménagements parking", r:"CORP", w:"Corporel (21)"},
    {q:"Prêt à une filiale", r:"FIN", w:"Financier (27)"},
    {q:"Camion de livraison", r:"CORP", w:"Corporel (21)"},
    {q:"Site internet marchand", r:"INC", w:"Incorporel (20)"},
    {q:"Ordinateur portable", r:"CORP", w:"Corporel (21)"},
    {q:"Caution électricité", r:"FIN", w:"Financier (27)"},
    {q:"Frais de développement", r:"INC", w:"Incorporel (20)"},
    {q:"Immeuble de bureaux", r:"CORP", w:"Corporel (21)"},
    {q:"Actions pour contrôle", r:"FIN", w:"Financier (26)"},
    {q:"Logiciel ERP", r:"INC", w:"Incorporel (20)"},
    {q:"Mobilier de bureau", r:"CORP", w:"Corporel (21)"},
    {q:"Avances sur immo", r:"FIN", w:"Financier (27)"},
    {q:"Licence d'exploitation", r:"INC", w:"Incorporel (20)"},
    {q:"Climatisation fixe", r:"CORP", w:"Corporel (21)"},
    {q:"Placements long terme", r:"FIN", w:"Financier (27)"},
    {q:"Droit au bail", r:"INC", w:"Incorporel (20)"},
    {q:"Matériel de labo", r:"CORP", w:"Corporel (21)"},
    {q:"Titres immobilisés", r:"FIN", w:"Financier (27)"},
    {q:"Frais de recherche", r:"INC", w:"Incorporel (20)"},
    {q:"Installation technique", r:"CORP", w:"Corporel (21)"},
    {q:"Prêts aux salariés", r:"FIN", w:"Financier (27)"},
    {q:"Marque déposée", r:"INC", w:"Incorporel (20)"},
    {q:"Échafaudages mobiles", r:"CORP", w:"Corporel (21)"}
];

        function showSection(id) {
            ['screen-menu', 'screen-game', 'screen-end', 'screen-cours'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            const isMenu = id === 'screen-menu';
            document.getElementById('btn-main-back').classList.toggle('hidden', !isMenu);
            document.getElementById('btn-mode-back').classList.toggle('hidden', isMenu);
            if(isMenu && timer) clearInterval(timer);
        }

        function startGame(m) {
            mode = m; score = 0; timeLeft = 60; showSection('screen-game');
            document.getElementById('score-ui').innerText = "0";
            if(mode === 'learning') { document.getElementById('game-info').classList.add('hidden'); }
            else {
                document.getElementById('game-info').classList.remove('hidden');
                if(mode === 'competition') {
                    document.getElementById('timer-container').classList.remove('hidden');
                    document.getElementById('timer-ui').innerText = "60s";
                    startTimer();
                } else { document.getElementById('timer-container').classList.add('hidden'); }
            }
            next();
        }

        function startTimer() {
            timer = setInterval(() => { timeLeft--; document.getElementById('timer-ui').innerText = timeLeft+"s"; if(timeLeft <= 0) stopGame(); }, 1000);
        }

        function next() {
            isProc = false; document.getElementById('feedback').classList.add('hidden');
            const item = db[Math.floor(Math.random()*db.length)];
            window.curr = item;
            document.getElementById('item-name').innerText = item.q;
        }

        function check(v) {
            if(isProc) return; isProc = true;
            const isOk = (v === window.curr.r);
            const f = document.getElementById('feedback'); f.classList.remove('hidden');
            if ("vibrate" in navigator) isOk ? navigator.vibrate(30) : navigator.vibrate([50, 30, 50]);
            
            if(isOk) {
                if(mode !== 'learning') { score += 100; document.getElementById('score-ui').innerText = score; }
                f.className="feedback-overlay bg-emerald-500/90 text-white text-6xl"; f.innerHTML="<i class='fas fa-check'></i>";
                setTimeout(next, 300);
            } else {
                if(timer) clearInterval(timer); // PAUSE DU TIMER
                f.className="feedback-overlay bg-red-600/95 flex-col text-white p-6";
                f.innerHTML=`<i class='fas fa-times text-6xl mb-2'></i><p class='text-xs uppercase font-bold italic'>${window.curr.w}</p>
                <button onclick="alert('${window.curr.detail.replace(/'/g, "\\'")}')" class="mt-4 px-4 py-2 bg-white/20 rounded-xl text-[10px] uppercase tracking-widest italic font-bold">Pourquoi ? <i class="fas fa-question-circle ml-2"></i></button>`;
                
                if(mode === 'competition') { score = Math.max(0, score-50); timeLeft -= 3; document.getElementById('score-ui').innerText = score; }
                if(mode === 'survival') { setTimeout(stopGame, 3000); return; }
                
                setTimeout(() => {
                    next();
                    if(mode === 'competition') startTimer(); // RELANCE DU TIMER
                }, 1500); // Délai réduit pour fluidité
            }
        }

function stopGame() { 
            if(timer) clearInterval(timer); 
            showSection('screen-end'); 
            document.getElementById('end-visual').innerText = mode === 'learning' ? "ZEN" : score;
            if(mode !== 'learning') {
                const key = 'immo';
                const best = parseInt(localStorage.getItem('record_' + key) || 0);
                if(score > best) localStorage.setItem('record_' + key, score);

                // LOGIQUE TOP 3
                let history = JSON.parse(localStorage.getItem('history_' + key) || "[]");
                history.push(score);
                history.sort((a, b) => b - a);
                localStorage.setItem('history_' + key, JSON.stringify(history.slice(0, 3)));

                gtag('event', 'game_finish', { 'game_name': 'Tri d Immo', 'score': score, 'mode': mode });
            }
        }

        function shareScore() {
            const message = `🏆 Nouveau Record sur Tri d'Immo : ${score} points ! 🔥\\n\\nJoue ici : https://bibiquette.github.io/objectif-dscg/`;
            if (navigator.share) { navigator.share({ title: 'Mon Record DCG', text: message, url: 'https://bibiquette.github.io/objectif-dscg/' }).catch(() => {}); }
            else { navigator.clipboard.writeText(message).then(() => { alert("Copié !"); }); }
        }
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(registration => {
              console.log('ServiceWorker PWA enregistré !');
            })
            .catch(error => {
              console.log('Erreur ServiceWorker : ', error);
            });
        });
      }
    </script>
</body>
</html>
